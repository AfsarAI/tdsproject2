<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Quiz Solver - TDS Project 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-mono {
            font-family: 'Fira Code', monospace;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen p-6">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 h-[calc(100vh-3rem)]">

        <!-- Left Panel: Controls -->
        <div class="lg:col-span-1 space-y-6">
            <div class="glass rounded-2xl p-6 h-full flex flex-col">
                <div class="flex items-center justify-between mb-6">
                    <h1
                        class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-teal-500">
                        Quiz Solver
                    </h1>
                    <a href="/" class="text-slate-400 hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                    </a>
                </div>

                <form id="solverForm" class="space-y-4 flex-grow">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Student Email</label>
                        <input type="email" id="email" name="email" value="23f2002023@ds.study.iitm.ac.in"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 focus:outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Secret</label>
                        <input type="text" id="secret" name="secret" value="224149"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 focus:outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Quiz URL</label>
                        <input type="url" id="url" name="url" value="https://tds-llm-analysis.s-anand.net/demo"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 focus:outline-none transition-all">
                    </div>

                    <div class="pt-4 space-y-3">
                        <button type="submit" id="startBtn"
                            class="w-full bg-gradient-to-r from-green-600 to-teal-600 hover:from-green-500 hover:to-teal-500 text-white font-bold py-3 px-4 rounded-xl transition-all transform hover:scale-[1.02] shadow-lg shadow-green-900/20 flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                                    clip-rule="evenodd" />
                            </svg>
                            Start Solver
                        </button>

                        <button type="button" id="testBtn"
                            class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold py-3 px-4 rounded-xl transition-all border border-slate-700">
                            Run Test (Demo)
                        </button>
                    </div>
                </form>

                <div class="mt-6 pt-6 border-t border-slate-800">
                    <div class="flex items-center justify-between text-sm text-slate-500">
                        <span>Status:</span>
                        <span id="statusIndicator" class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-slate-600"></span>
                            Idle
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Live Logs -->
        <div class="lg:col-span-2 h-full">
            <div class="glass rounded-2xl p-6 h-full flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-slate-300 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        Live Agent Logs
                    </h2>
                    <button id="clearLogs"
                        class="text-xs text-slate-500 hover:text-white px-2 py-1 rounded hover:bg-slate-800 transition-colors">
                        Clear Logs
                    </button>
                </div>

                <div id="logsContainer"
                    class="flex-grow bg-black/50 rounded-xl p-4 font-mono text-sm overflow-y-auto space-y-1 border border-slate-800/50 shadow-inner">
                    <div class="text-slate-600 italic">Waiting for tasks...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const logsContainer = document.getElementById('logsContainer');
        const statusIndicator = document.getElementById('statusIndicator');
        let lastLogIndex = 0;
        let pollingInterval = null;

        function appendLog(message, type = 'info') {
            const div = document.createElement('div');
            div.className = 'break-words';

            // Simple coloring based on content
            if (message.includes('[error]') || type === 'error') {
                div.className += ' text-red-400';
                message = message.replace(/\[error\]|\[\/error\]/g, '');
            } else if (message.includes('[success]') || message.includes('Correct!')) {
                div.className += ' text-green-400 font-bold';
                message = message.replace(/\[success\]|\[\/success\]/g, '');
            } else if (message.includes('[warning]')) {
                div.className += ' text-yellow-400';
                message = message.replace(/\[warning\]|\[\/warning\]/g, '');
            } else if (message.includes('[info]')) {
                div.className += ' text-blue-400';
                message = message.replace(/\[info\]|\[\/info\]/g, '');
            } else {
                div.className += ' text-slate-300';
            }

            // Handle URL formatting
            message = message.replace(/\[url\](.*?)\[\/url\]/g, '<a href="$1" target="_blank" class="text-blue-400 underline hover:text-blue-300">$1</a>');

            div.innerHTML = `<span class="text-slate-600 text-xs mr-2">[${new Date().toLocaleTimeString()}]</span>` + message;
            logsContainer.appendChild(div);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(fetchLogs, 1000);
            statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Running';
        }

        async function fetchLogs() {
            try {
                const response = await fetch(`/api/logs?since=${lastLogIndex}`);
                const data = await response.json();

                if (data.logs && data.logs.length > 0) {
                    // Remove "Waiting..." message if present
                    if (logsContainer.children[0]?.classList.contains('italic')) {
                        logsContainer.innerHTML = '';
                    }

                    data.logs.forEach(log => {
                        appendLog(log);
                    });
                    lastLogIndex = data.next_index;
                }
            } catch (e) {
                console.error("Error fetching logs:", e);
            }
        }

        document.getElementById('solverForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData.entries());

            appendLog("Starting solver task...", 'info');
            startPolling();

            try {
                const res = await fetch('/quiz-webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (res.ok) {
                    appendLog(`Task accepted: ${result.message}`, 'success');
                } else {
                    appendLog(`Error: ${result.error}`, 'error');
                }
            } catch (err) {
                appendLog(`Network Error: ${err.message}`, 'error');
            }
        });

        document.getElementById('testBtn').addEventListener('click', () => {
            document.getElementById('email').value = "23f2002023@ds.study.iitm.ac.in";
            document.getElementById('secret').value = "224149";
            document.getElementById('url').value = "https://tds-llm-analysis.s-anand.net/demo";
            document.getElementById('startBtn').click();
        });

        document.getElementById('clearLogs').addEventListener('click', () => {
            logsContainer.innerHTML = '<div class="text-slate-600 italic">Logs cleared. Waiting for tasks...</div>';
        });
    </script>
</body>

</html>
